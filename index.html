<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Potion Guide</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;500;600;700&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
        <link rel="icon" href="./favicon.ico" sizes="any">
        <link rel="stylesheet" href="./style.css">
        <script src="./script.js" defer></script>
    </head>
    <body>
        <main id="potion-guide-page" class="potion-guide-page">
            <header class="page-header">
                <div class="page-heading">
                    <h1>POTION GUIDE</h1>
                    <p class="subtitle">Because the other guides look terrible.</p>
                </div>

                <div class="page-actions">
                    <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Switch to light mode" title="Switch to light mode">
                        <span class="theme-toggle-track" aria-hidden="true">
                            <span class="theme-toggle-thumb"></span>
                        </span>
                    </button>
                </div>
            </header>

            <section class="app-layout">
                <aside class="potion-sidebar" aria-label="Potion list">
                    <div id="potion-list" class="potion-list"></div>
                </aside>

                <section id="recipe-panel" class="recipe-panel" aria-live="polite"></section>
            </section>
        </main>
    </body>
</html>
